apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: service-desk
  namespace: argocd
spec:
  description: Service Desk applications managed via GitOps
  sourceRepos:
    - https://github.com/entozhevlad/service-desk.git
  destinations:
    - namespace: service-desk
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
