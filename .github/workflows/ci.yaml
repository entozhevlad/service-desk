name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "helm/**"
      - "argocd/**"
      - "alerts/**"
      - "sonar-project.properties"
      - "README.md"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "helm/**"
      - "argocd/**"
      - "alerts/**"
      - "sonar-project.properties"
      - "README.md"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Unit tests with coverage gate
        run: >
          uv run pytest tests/unit
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=80

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/coverage.xml
          if-no-files-found: error

  backend-build:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f src/backend/Dockerfile -t service-desk-backend:ci src/backend

  frontend-test:
    name: Frontend - tests
    runs-on: ubuntu-latest
    needs: [backend-tests]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests with coverage gate
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/frontend/coverage/lcov.info
          if-no-files-found: error

  frontend-build:
    name: Frontend - build
    runs-on: ubuntu-latest
    needs: [backend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f src/frontend/Dockerfile --build-arg VITE_API_BASE_URL=/api -t service-desk-frontend:ci src/frontend

      - name: Extract dist artifact
        run: |
          docker create --name frontend-dist service-desk-frontend:ci
          mkdir -p src/frontend/dist
          docker cp frontend-dist:/usr/share/nginx/html/. src/frontend/dist
          docker rm frontend-dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          if-no-files-found: error

  helm-lint:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: |
          helm lint helm/service-desk-backend
          helm lint helm/service-desk-frontend
          helm lint helm/service-desk-monitoring
          helm lint helm/service-desk-sonarqube

  backend-sonar:
    name: Backend - SonarQube
    runs-on: ubuntu-latest
    needs: [helm-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: src/backend

      - name: SonarQube scan (backend)
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=service-desk-backend
            -Dsonar.projectName=service-desk-backend
            -Dsonar.sources=src/backend/app
            -Dsonar.tests=src/backend/tests
            -Dsonar.python.coverage.reportPaths=src/backend/coverage.xml
            -Dsonar.python.version=3.12
            -Dsonar.exclusions=**/__pycache__/**,**/.venv/**,**/migrations/**
            -Dsonar.sourceEncoding=UTF-8

      - name: SonarQube quality gate (backend)
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

  frontend-sonar:
    name: Frontend - SonarQube
    runs-on: ubuntu-latest
    needs: [backend-sonar]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: src/frontend/coverage

      - name: SonarQube scan (frontend)
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=service-desk-frontend
            -Dsonar.projectName=service-desk-frontend
            -Dsonar.sources=src/frontend/src
            -Dsonar.tests=src/frontend/src
            -Dsonar.test.inclusions=src/frontend/src/**/*.test.ts,src/frontend/src/**/__tests__/**
            -Dsonar.javascript.lcov.reportPaths=src/frontend/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
            -Dsonar.sourceEncoding=UTF-8

      - name: SonarQube quality gate (frontend)
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: isort (check)
        run: uv run isort --check-only app

      - name: flake8
        run: uv run flake8 app

      - name: mypy
        run: uv run mypy app

  backend-image-publish:
    name: Backend - build and push image
    runs-on: ubuntu-latest
    needs: [frontend-sonar]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image_tag
        run: |
          echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to cloud registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: |
            ${{ vars.BACKEND_IMAGE_REPOSITORY }}:${{ steps.image_tag.outputs.value }}
            ${{ vars.BACKEND_IMAGE_REPOSITORY }}:latest

  frontend-image-publish:
    name: Frontend - build and push image
    runs-on: ubuntu-latest
    needs: [backend-image-publish]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image_tag
        run: |
          echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to cloud registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: |
            ${{ vars.FRONTEND_IMAGE_REPOSITORY }}:${{ steps.image_tag.outputs.value }}
            ${{ vars.FRONTEND_IMAGE_REPOSITORY }}:latest

  gitops-update:
    name: GitOps - update Helm values for Argo CD
    runs-on: ubuntu-latest
    needs: [frontend-image-publish]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update backend image in values-prod
        run: |
          sed -i -E "s|^([[:space:]]*repository:[[:space:]]*).*$|\1${{ vars.BACKEND_IMAGE_REPOSITORY }}|" helm/service-desk-backend/values-prod.yaml
          sed -i -E "s|^([[:space:]]*tag:[[:space:]]*).*$|\1${GITHUB_SHA}|" helm/service-desk-backend/values-prod.yaml

      - name: Update frontend image in values-prod
        run: |
          sed -i -E "s|^([[:space:]]*repository:[[:space:]]*).*$|\1${{ vars.FRONTEND_IMAGE_REPOSITORY }}|" helm/service-desk-frontend/values-prod.yaml
          sed -i -E "s|^([[:space:]]*tag:[[:space:]]*).*$|\1${GITHUB_SHA}|" helm/service-desk-frontend/values-prod.yaml

      - name: Commit and push manifest changes
        run: |
          if git diff --quiet -- helm/service-desk-backend/values-prod.yaml helm/service-desk-frontend/values-prod.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/service-desk-backend/values-prod.yaml helm/service-desk-frontend/values-prod.yaml
          git commit -m "ci(gitops): update image tags to ${GITHUB_SHA} [skip ci]"
          git push

  argocd-deploy:
    name: Deploy - Argo CD sync
    runs-on: ubuntu-latest
    needs: [gitops-update]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          argocd version --client

      - name: Login to Argo CD
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
        run: |
          argocd login "$ARGOCD_SERVER" \
            --username "$ARGOCD_USERNAME" \
            --password "$ARGOCD_PASSWORD" \
            --grpc-web \
            --insecure

      - name: Sync and wait for backend
        run: |
          argocd app get service-desk-backend --refresh
          argocd app sync service-desk-backend --timeout 600 --prune
          argocd app wait service-desk-backend --sync --health --timeout 600

      - name: Sync and wait for frontend
        run: |
          argocd app get service-desk-frontend --refresh
          argocd app sync service-desk-frontend --timeout 600 --prune
          argocd app wait service-desk-frontend --sync --health --timeout 600

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-tests
      - frontend-test
      - backend-build
      - frontend-build
      - helm-lint
      - backend-sonar
      - frontend-sonar
      - backend-image-publish
      - frontend-image-publish
      - gitops-update
      - argocd-deploy
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PIPELINE_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          BACKEND_LINT_RESULT: ${{ needs.backend-lint.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_TEST_RESULT: ${{ needs.frontend-test.result }}
          BACKEND_BUILD_RESULT: ${{ needs.backend-build.result }}
          FRONTEND_BUILD_RESULT: ${{ needs.frontend-build.result }}
          HELM_LINT_RESULT: ${{ needs.helm-lint.result }}
          BACKEND_SONAR_RESULT: ${{ needs.backend-sonar.result }}
          FRONTEND_SONAR_RESULT: ${{ needs.frontend-sonar.result }}
          BACKEND_IMAGE_PUBLISH_RESULT: ${{ needs.backend-image-publish.result }}
          FRONTEND_IMAGE_PUBLISH_RESULT: ${{ needs.frontend-image-publish.result }}
          GITOPS_UPDATE_RESULT: ${{ needs.gitops-update.result }}
          ARGOCD_DEPLOY_RESULT: ${{ needs.argocd-deploy.result }}
        run: |
          summary=$'CI/CD status: '"${PIPELINE_STATUS^^}"$'\n'
          summary+=$'Repository: '"${{ github.repository }}"$'\n'
          summary+=$'Workflow: '"${{ github.workflow }}"$'\n'
          summary+=$'Branch: '"${{ github.ref_name }}"$'\n'
          summary+=$'Commit: '"${{ github.sha }}"$'\n'
          summary+=$'\nJobs:\n'
          summary+=$'- backend-lint: '"${BACKEND_LINT_RESULT}"$'\n'
          summary+=$'- backend-tests: '"${BACKEND_TESTS_RESULT}"$'\n'
          summary+=$'- frontend-test: '"${FRONTEND_TEST_RESULT}"$'\n'
          summary+=$'- backend-build: '"${BACKEND_BUILD_RESULT}"$'\n'
          summary+=$'- frontend-build: '"${FRONTEND_BUILD_RESULT}"$'\n'
          summary+=$'- helm-lint: '"${HELM_LINT_RESULT}"$'\n'
          summary+=$'- backend-sonar: '"${BACKEND_SONAR_RESULT}"$'\n'
          summary+=$'- frontend-sonar: '"${FRONTEND_SONAR_RESULT}"$'\n'
          summary+=$'- backend-image-publish: '"${BACKEND_IMAGE_PUBLISH_RESULT}"$'\n'
          summary+=$'- frontend-image-publish: '"${FRONTEND_IMAGE_PUBLISH_RESULT}"$'\n'
          summary+=$'- gitops-update: '"${GITOPS_UPDATE_RESULT}"$'\n'
          summary+=$'- argocd-deploy: '"${ARGOCD_DEPLOY_RESULT}"$'\n'
          summary+=$'\nRun: '"${GITHUB_RUN_URL}"

          uv sync --project alerts --python 3.12
          uv run --project alerts --python 3.12 python alerts/telegram_notifier.py \
            --status "${PIPELINE_STATUS}" \
            --message "${summary}"
