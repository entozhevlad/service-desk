name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "helm/**"
      - "argocd/**"
      - "alerts/**"
      - "sonar-project.properties"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "helm/**"
      - "argocd/**"
      - "alerts/**"
      - "sonar-project.properties"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        id: setup_uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        id: deps
        run: uv sync --frozen || uv sync

      - name: Unit tests with coverage gate
        id: tests
        run: >
          uv run pytest tests/unit
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=80

      - name: Upload backend coverage
        id: upload_backend_cov
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/coverage.xml
          if-no-files-found: error

      - name: Notify backend-tests step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: backend-tests
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  backend-build:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Build backend image
        id: build_backend
        run: docker build -f src/backend/Dockerfile -t service-desk-backend:ci src/backend

      - name: Notify backend-build step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: backend-build
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  frontend-test:
    name: Frontend - tests
    runs-on: ubuntu-latest
    needs: [backend-tests]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Setup Node
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install deps
        id: npm_install
        run: npm ci

      - name: Unit tests with coverage gate
        id: frontend_tests
        run: npm run test:coverage

      - name: Upload frontend coverage
        id: upload_frontend_cov
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/frontend/coverage/lcov.info
          if-no-files-found: error

      - name: Notify frontend-test step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: frontend-test
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  frontend-build:
    name: Frontend - build
    runs-on: ubuntu-latest
    needs: [backend-build]
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Build frontend image
        id: build_frontend
        run: docker build -f src/frontend/Dockerfile --build-arg VITE_API_BASE_URL=/api -t service-desk-frontend:ci src/frontend

      - name: Extract dist artifact
        id: extract_dist
        run: |
          docker create --name frontend-dist service-desk-frontend:ci
          mkdir -p src/frontend/dist
          docker cp frontend-dist:/usr/share/nginx/html/. src/frontend/dist
          docker rm frontend-dist

      - name: Upload dist artifact
        id: upload_dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          if-no-files-found: error

      - name: Notify frontend-build step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: frontend-build
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  helm-lint:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Set up Helm
        id: setup_helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        id: helm_lint_step
        run: |
          helm lint helm/service-desk-backend
          helm lint helm/service-desk-frontend
          helm lint helm/service-desk-monitoring

      - name: Notify helm-lint step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: helm-lint
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        id: setup_uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        id: deps
        run: uv sync --frozen || uv sync

      - name: isort (check)
        id: isort
        run: uv run isort --check-only app

      - name: flake8
        id: flake8
        run: uv run flake8 app

      - name: mypy
        id: mypy
        run: uv run mypy app

      - name: Notify backend-lint step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: backend-lint
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  backend-image-publish:
    name: Backend - build and push image
    runs-on: ubuntu-latest
    needs: [helm-lint]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Set up Docker Buildx
        id: setup_buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image_tag
        run: |
          echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to cloud registry
        id: docker_login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        id: build_push_backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: |
            ${{ vars.BACKEND_IMAGE_REPOSITORY }}:${{ steps.image_tag.outputs.value }}
            ${{ vars.BACKEND_IMAGE_REPOSITORY }}:latest

      - name: Notify backend-image-publish step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: backend-image-publish
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  frontend-image-publish:
    name: Frontend - build and push image
    runs-on: ubuntu-latest
    needs: [backend-image-publish]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Set up Docker Buildx
        id: setup_buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image_tag
        run: |
          echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to cloud registry
        id: docker_login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        id: build_push_frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: |
            ${{ vars.FRONTEND_IMAGE_REPOSITORY }}:${{ steps.image_tag.outputs.value }}
            ${{ vars.FRONTEND_IMAGE_REPOSITORY }}:latest

      - name: Notify frontend-image-publish step results
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_NAME: frontend-image-publish
        run: |
          msg="${JOB_NAME}: ${{ job.status }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$msg" >/dev/null

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-test
      - backend-lint
      - backend-build
      - frontend-build
      - helm-lint
      - backend-image-publish
      - frontend-image-publish
    if: always()
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        id: setup_uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PIPELINE_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_TEST_RESULT: ${{ needs.frontend-test.result }}
          BACKEND_LINT_RESULT: ${{ needs.backend-lint.result }}
          BACKEND_BUILD_RESULT: ${{ needs.backend-build.result }}
          FRONTEND_BUILD_RESULT: ${{ needs.frontend-build.result }}
          HELM_LINT_RESULT: ${{ needs.helm-lint.result }}
          BACKEND_IMAGE_PUBLISH_RESULT: ${{ needs.backend-image-publish.result }}
          FRONTEND_IMAGE_PUBLISH_RESULT: ${{ needs.frontend-image-publish.result }}
        run: |
          failed_jobs=()
          [ "${BACKEND_TESTS_RESULT}" = "failure" ] && failed_jobs+=("backend-tests")
          [ "${FRONTEND_TEST_RESULT}" = "failure" ] && failed_jobs+=("frontend-test")
          [ "${BACKEND_LINT_RESULT}" = "failure" ] && failed_jobs+=("backend-lint")
          [ "${BACKEND_BUILD_RESULT}" = "failure" ] && failed_jobs+=("backend-build")
          [ "${FRONTEND_BUILD_RESULT}" = "failure" ] && failed_jobs+=("frontend-build")
          [ "${HELM_LINT_RESULT}" = "failure" ] && failed_jobs+=("helm-lint")
          [ "${BACKEND_IMAGE_PUBLISH_RESULT}" = "failure" ] && failed_jobs+=("backend-image-publish")
          [ "${FRONTEND_IMAGE_PUBLISH_RESULT}" = "failure" ] && failed_jobs+=("frontend-image-publish")

          message_override=""
          if [ "${#failed_jobs[@]}" -gt 0 ]; then
            failed_list="$(IFS=,; echo "${failed_jobs[*]}")"
            message_override=$'CI/CD status: FAILURE\n'
            message_override+=$'Repository: '"${{ github.repository }}"$'\n'
            message_override+=$'Workflow: '"${{ github.workflow }}"$'\n'
            message_override+=$'Branch: '"${{ github.ref_name }}"$'\n'
            message_override+=$'Commit: '"${{ github.sha }}"$'\n'
            message_override+=$'Failed jobs: '"${failed_list}"$'\n'
            message_override+=$'Run: '"${GITHUB_RUN_URL}"
          fi

          uv sync --project alerts --python 3.12
          uv run --project alerts --python 3.12 python alerts/telegram_notifier.py \
            --status "${PIPELINE_STATUS}" \
            --message "${message_override}"
