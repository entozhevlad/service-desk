apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-desk-frontend.nginxConfigName" . }}
  labels:
    {{- include "service-desk-frontend.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      # Swagger UI loads schema from /openapi.json (site root), not /api/openapi.json.
      location = /openapi.json {
        proxy_pass http://{{ .Values.backend.serviceName }}:{{ .Values.backend.servicePort }}/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }

      location /api/ {
        proxy_pass http://{{ .Values.backend.serviceName }}:{{ .Values.backend.servicePort }}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
