replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: docker.io/aliquis21/service-desk-frontend
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []

service:
  type: NodePort
  port: 80
  nodePort: 30081

container:
  port: 80

backend:
  serviceName: service-desk-backend
  servicePort: 8000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: service-desk.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

livenessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
