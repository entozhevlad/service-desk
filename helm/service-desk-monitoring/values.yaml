nameOverride: ""
fullnameOverride: ""

prometheus:
  image:
    repository: prom/prometheus
    tag: v2.53.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
    nodePort: null
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  retention: 24h
  scrapeInterval: 15s
  backendPodScrape:
    enabled: true
    appNameLabel: service-desk-backend
    containerPort: "8000"
  backendTarget: service-desk-backend.service-desk.svc.cluster.local:8000

grafana:
  image:
    repository: grafana/grafana
    tag: 11.1.4
    pullPolicy: IfNotPresent
  adminUser: admin
  adminPassword: admin
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  database:
    type: sqlite
    host: service-desk-postgresql.service-desk.svc.cluster.local:5432
    name: grafana
    user: grafana
    password: change-me
    sslMode: disable
  service:
    type: NodePort
    port: 3000
    nodePort: 30300
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
