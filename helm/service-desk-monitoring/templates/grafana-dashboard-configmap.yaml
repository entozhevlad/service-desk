apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-desk-monitoring.grafanaName" . }}-dashboard
  labels:
    {{- include "service-desk-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  service-desk-backend.json: |
    {
      "id": null,
      "uid": "service-desk-backend-overview",
      "title": "Service Desk Backend Overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "HTTP RPS (all)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m]))",
              "legendFormat": "rps",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Ticket Create RPS (POST /ticket)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{handler=\"/ticket\",method=\"POST\",status=~\"2..\"}[5m]))",
              "legendFormat": "ticket_create_rps",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Created Tickets (last 1h)",
          "type": "stat",
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{handler=\"/ticket\",method=\"POST\",status=~\"2..\"}[1h]))",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value"
          }
        },
        {
          "id": 4,
          "title": "5xx RPS",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m]))",
              "legendFormat": "5xx_rps",
              "refId": "A"
            }
          ]
        }
      ],
      "time": {
        "from": "now-30m",
        "to": "now"
      }
    }
