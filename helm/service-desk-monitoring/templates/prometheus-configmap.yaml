apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-desk-monitoring.prometheusName" . }}-config
  labels:
    {{- include "service-desk-monitoring.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      {{- if .Values.prometheus.backendPodScrape.enabled }}
      - job_name: "service-desk-backend-pods"
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_phase]
            action: keep
            regex: Running
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: {{ .Values.prometheus.backendPodScrape.appNameLabel | quote }}
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: {{ .Values.prometheus.backendPodScrape.containerPort | quote }}
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      {{- else }}
      - job_name: "service-desk-backend"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Values.prometheus.backendTarget }}"]
      {{- end }}
