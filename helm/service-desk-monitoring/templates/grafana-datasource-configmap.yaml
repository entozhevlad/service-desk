apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-desk-monitoring.grafanaName" . }}-datasource
  labels:
    {{- include "service-desk-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "service-desk-monitoring.prometheusName" . }}:{{ .Values.prometheus.service.port }}
        isDefault: true
        editable: false
