apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-desk-monitoring.grafanaName" . }}-dashboard-provider
  labels:
    {{- include "service-desk-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: service-desk
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
