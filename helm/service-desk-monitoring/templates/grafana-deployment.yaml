apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-desk-monitoring.grafanaName" . }}
  labels:
    {{- include "service-desk-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "service-desk-monitoring.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      annotations:
        checksum/grafana-datasource: {{ include (print $.Template.BasePath "/grafana-datasource-configmap.yaml") . | sha256sum }}
        checksum/grafana-dashboard-provider: {{ include (print $.Template.BasePath "/grafana-dashboard-provider-configmap.yaml") . | sha256sum }}
        checksum/grafana-dashboard: {{ include (print $.Template.BasePath "/grafana-dashboard-configmap.yaml") . | sha256sum }}
        checksum/grafana-admin-secret: {{ include (print $.Template.BasePath "/grafana-secret.yaml") . | sha256sum }}
      labels:
        {{- include "service-desk-monitoring.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "service-desk-monitoring.grafanaName" . }}-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "service-desk-monitoring.grafanaName" . }}-admin
                  key: admin-password
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards/service-desk-backend.json
              subPath: service-desk-backend.json
      volumes:
        - name: datasource
          configMap:
            name: {{ include "service-desk-monitoring.grafanaName" . }}-datasource
        - name: dashboard-provider
          configMap:
            name: {{ include "service-desk-monitoring.grafanaName" . }}-dashboard-provider
        - name: dashboard
          configMap:
            name: {{ include "service-desk-monitoring.grafanaName" . }}-dashboard
