apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-desk-monitoring.grafanaName" . }}
  labels:
    {{- include "service-desk-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - name: http
      port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.grafana.service.type "NodePort") .Values.grafana.service.nodePort }}
      nodePort: {{ .Values.grafana.service.nodePort }}
      {{- end }}
  selector:
    {{- include "service-desk-monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
