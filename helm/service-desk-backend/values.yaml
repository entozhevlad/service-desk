replicaCount: 1
replicasCount: null

nameOverride: ""
fullnameOverride: ""

image:
  repository: docker.io/zjozjyr/service-desk-backend
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8000

container:
  port: 8000

env:
  APP_ENV: "prod"
  UVICORN_RELOAD: "0"
  RUN_MIGRATIONS: "1"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "service_desk"
  POSTGRES_USER: "service_desk"

secretEnv: {}
existingSecretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 15

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: service-desk-backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
