sonar.projectName=service-desk
sonar.sourceEncoding=UTF-8

sonar.sources=src/backend/app,src/frontend/src
sonar.tests=src/backend/tests,src/frontend/src
sonar.test.inclusions=src/backend/tests/**/*,src/frontend/src/**/*.test.ts,src/frontend/src/**/__tests__/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=src/backend/coverage.xml
sonar.javascript.lcov.reportPaths=src/frontend/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.venv/**,**/__pycache__/**,**/migrations/**
